name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Typecheck, lint, and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Format check
        run: pnpm format

      - name: Install Chromium for Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser test
        run: pnpm test:browser
        env:
          HON120_REQUIRE_WRANGLER: "1"

      - name: Upload Playwright evidence
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: hon-120-playwright-evidence
          path: |
            test/.tmp/playwright-report/
            test/.tmp/playwright-results/
          if-no-files-found: ignore
          retention-days: 7
